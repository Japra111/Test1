
<style>
  #matrix-wrap { position:relative; background:#000; border-radius:12px; overflow:hidden; height:300px; }
  #rain-canvas { position:absolute; top:0; left:0; width:100%; height:100%; }
  #jprx-text {
    position:absolute; top:0; left:0; width:100%; height:100%;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    pointer-events:none;
  }
  #jprx-text pre {
    font-family:'Courier New',monospace;
    font-size:13px;
    line-height:1.4;
    margin:0;
    color:#00ff41;
    text-shadow: 0 0 8px #00ff41, 0 0 20px #00ff41, 0 0 40px #00cc33;
    animation: flicker 3s infinite;
  }
  #jprx-text .sub {
    font-family:'Courier New',monospace;
    font-size:11px;
    color:#00bb30;
    letter-spacing:6px;
    margin-top:10px;
    text-shadow: 0 0 6px #00ff41;
    animation: flicker 4s infinite 1s;
  }
  @keyframes flicker {
    0%,95%,100%{opacity:1} 96%{opacity:0.85} 97%{opacity:1} 98%{opacity:0.9}
  }
</style>

<div id="matrix-wrap">
  <canvas id="rain-canvas"></canvas>
  <div id="jprx-text">
    <pre id="ascii-art">
     ██╗██████╗ ██████╗ ██╗  ██╗
     ██║██╔══██╗██╔══██╗╚██╗██╔╝

██   ██║██╔═══╝ ██╔══██╗ ██╔██╗ 
╚█████╔╝██║     ██║  ██║██╔╝ ██╗
 ╚════╝ ╚═╝     ╚═╝  ╚═╝╚═╝  ╚═╝</pre>
    <div class="sub">J A V A S C R I P T · P Y T H O N · R E A C T</div>
  </div>
</div>

<script>
const canvas = document.getElementById('rain-canvas');
const ctx = canvas.getContext('2d');

function resize() {
  canvas.width = canvas.offsetWidth;
  canvas.height = canvas.offsetHeight;
}
resize();

const chars = 'アイウエオカキクケコサシスセソタチツテトナニヌネノ0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ@#$%&';
const fontSize = 13;
let cols, drops;

function init() {
  cols = Math.floor(canvas.width / fontSize);
  drops = Array(cols).fill(0).map(() => Math.random() * -50);
}
init();

function draw() {
  ctx.fillStyle = 'rgba(0,0,0,0.05)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  for (let i = 0; i < cols; i++) {
    const char = chars[Math.floor(Math.random() * chars.length)];
    const y = drops[i] * fontSize;

    // Head of drop — bright white-green
    ctx.fillStyle = '#ccffcc';
    ctx.font = `${fontSize}px 'Courier New', monospace`;
    ctx.fillText(char, i * fontSize, y);

    // Trail fades green
    ctx.fillStyle = `rgba(0,${180 + Math.random()*75},${30 + Math.random()*20},${0.6 + Math.random()*0.4})`;
    const trailChar = chars[Math.floor(Math.random() * chars.length)];
    ctx.fillText(trailChar, i * fontSize, y - fontSize);

    if (y > canvas.height && Math.random() > 0.975) {
      drops[i] = 0;
    }
    drops[i] += 0.5;
  }
}

setInterval(draw, 33);
window.addEventListener('resize', () => { resize(); init(); });
</script>
